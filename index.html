<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ سایت عشق من</title>
    <style>
        /* ====== RESET ====== */
        * { margin:0; padding:0; box-sizing:border-box; }
        
        /* ====== تم‌ها ====== */
        :root {
            --bg1: #fce4ec;
            --bg2: #f3e5f5;
            --bg3: #e8eaf6;
            --card-bg: rgba(255,255,255,0.85);
            --primary: #e91e63;
            --secondary: #9c27b0;
            --text: #4a148c;
            --shadow: rgba(233,30,99,0.2);
            --border: #f8bbd0;
        }
        
        [data-theme="rose"] {
            --bg1: #fce4ec;
            --bg2: #f3e5f5;
            --bg3: #e8eaf6;
            --primary: #e91e63;
            --secondary: #9c27b0;
            --text: #4a148c;
            --shadow: rgba(233,30,99,0.2);
            --border: #f8bbd0;
        }
        [data-theme="violet"] {
            --bg1: #ede7f6;
            --bg2: #e1bee7;
            --bg3: #d1c4e9;
            --primary: #7b1fa2;
            --secondary: #4a148c;
            --text: #311b92;
            --shadow: rgba(123,31,162,0.2);
            --border: #ce93d8;
        }
        [data-theme="sky"] {
            --bg1: #e3f2fd;
            --bg2: #bbdefb;
            --bg3: #90caf9;
            --primary: #1565c0;
            --secondary: #0d47a1;
            --text: #0d47a1;
            --shadow: rgba(21,101,192,0.2);
            --border: #64b5f6;
        }
        [data-theme="sunset"] {
            --bg1: #fff3e0;
            --bg2: #ffe0b2;
            --bg3: #ffcc80;
            --primary: #e65100;
            --secondary: #bf360c;
            --text: #bf360c;
            --shadow: rgba(230,81,0,0.2);
            --border: #ffb74d;
        }
        
        body {
            font-family: 'Vazir', Tahoma, sans-serif;
            background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
            transition: all 0.5s ease;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        /* ====== قلب‌های شناور ====== */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .heart {
            position: absolute;
            font-size: 20px;
            animation: floatUp 8s linear infinite;
            opacity: 0.4;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.3) rotate(0deg); opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.2) rotate(720deg); opacity: 0; }
        }
        
        /* ====== هدر ====== */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px var(--shadow);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .header h1 {
            font-size: 2.8em;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .sub {
            font-size: 1.2em;
            color: var(--secondary);
            margin: 10px 0;
        }
        .header .greeting {
            font-size: 1.1em;
            color: var(--text);
            opacity: 0.8;
            min-height: 30px;
        }
        .typing-cursor {
            display: inline-block;
            width: 3px;
            height: 20px;
            background: var(--primary);
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-right: 2px;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        /* ====== تب‌ها ====== */
        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            justify-content: center;
        }
        .tab-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            flex: 1;
            min-width: 120px;
            max-width: 200px;
        }
        .tab-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--shadow);
        }
        .tab-btn.active {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 8px 25px var(--shadow);
        }
        
        /* ====== کارت‌ها ====== */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px var(--shadow);
            border: 1px solid rgba(255,255,255,0.3);
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .card.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card h2 {
            color: var(--primary);
            border-bottom: 2px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        /* ====== دکمه‌ها ====== */
        .btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px var(--shadow);
        }
        .btn-small {
            padding: 6px 15px;
            font-size: 13px;
        }
        
        /* ====== پیام‌ها ====== */
        .msg-item {
            padding: 15px;
            margin: 10px 0;
            border-radius: 15px;
            background: var(--bg1);
            border-right: 4px solid var(--primary);
            transition: 0.3s;
        }
        .msg-item.today {
            background: var(--border);
            border-right: 4px solid var(--secondary);
            font-weight: bold;
        }
        .msg-date {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        
        /* ====== موزیک ====== */
        .music-player {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            padding: 15px;
            background: var(--bg1);
            border-radius: 20px;
        }
        .music-player img {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .music-player .info {
            flex: 1;
            min-width: 150px;
        }
        .music-player .info h3 {
            font-size: 1.1em;
            color: var(--text);
        }
        .music-player .info p {
            color: var(--secondary);
            font-size: 0.9em;
        }
        .music-player audio {
            width: 100%;
            margin-top: 10px;
        }
        
        .music-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            margin: 8px 0;
            background: var(--bg1);
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .music-item:hover {
            transform: translateX(-5px);
            background: var(--bg2);
        }
        .music-item img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
        }
        .music-item .info {
            flex: 1;
        }
        .music-item .info .title {
            font-weight: bold;
        }
        .music-item .info .artist {
            font-size: 13px;
            color: var(--secondary);
        }
        .music-item .duration {
            font-size: 12px;
            color: #888;
        }
        
        /* ====== نظرسنجی ====== */
        .poll-option {
            display: block;
            padding: 12px;
            margin: 8px 0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }
        .poll-option:hover {
            border-color: var(--primary);
        }
        .poll-option input[type="radio"] {
            margin-left: 10px;
        }
        
        .poll-result {
            margin: 10px 0;
        }
        .poll-result .label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 3px;
        }
        .poll-result .bar {
            height: 28px;
            background: var(--bg1);
            border-radius: 14px;
            overflow: hidden;
            position: relative;
        }
        .poll-result .bar .fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 14px;
            transition: width 0.8s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-size: 13px;
            font-weight: bold;
            min-width: 30px;
        }
        
        .poll-history {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--border);
        }
        .poll-history-item {
            padding: 10px;
            margin: 5px 0;
            background: var(--bg1);
            border-radius: 10px;
            font-size: 14px;
        }
        .poll-history-item .date {
            font-weight: bold;
            color: var(--primary);
        }
        
        /* ====== نظرات ====== */
        .comment-item {
            padding: 15px;
            margin: 10px 0;
            background: white;
            border-radius: 15px;
            border: 1px solid var(--bg2);
        }
        .comment-reply {
            background: var(--bg1);
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
            border-right: 3px solid var(--primary);
        }
        
        /* ====== پنل مدیریت ====== */
        #adminPanel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        #adminPanel.show {
            display: flex;
        }
        #adminPanel .modal {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(50px) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        #adminPanel .modal h2 {
            color: var(--primary);
            margin-bottom: 20px;
        }
        #adminPanel .close-btn {
            float: left;
            background: none;
            border: none;
            font-size: 28px;
            color: #999;
            cursor: pointer;
            transition: 0.3s;
        }
        #adminPanel .close-btn:hover {
            color: var(--primary);
            transform: rotate(90deg);
        }
        
        .admin-section {
            background: var(--bg1);
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
        }
        .admin-section h3 {
            color: var(--secondary);
            margin-bottom: 10px;
        }
        
        /* ====== فوتر ====== */
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text);
            opacity: 0.7;
            font-size: 14px;
            border-top: 1px solid var(--border);
            margin-top: 30px;
        }
        
        /* ====== تم سلکتور ====== */
        .theme-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: 0.3s;
        }
        .theme-btn:hover {
            transform: scale(1.15);
        }
        .theme-btn.active {
            border-color: var(--primary);
            transform: scale(1.1);
        }
        .theme-btn.rose { background: linear-gradient(135deg, #fce4ec, #e91e63); }
        .theme-btn.violet { background: linear-gradient(135deg, #ede7f6, #7b1fa2); }
        .theme-btn.sky { background: linear-gradient(135deg, #e3f2fd, #1565c0); }
        .theme-btn.sunset { background: linear-gradient(135deg, #fff3e0, #e65100); }
        
        /* ====== مدیریت ====== */
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--bg2);
            border-radius: 12px;
            font-size: 16px;
            margin: 8px 0;
            background: white;
            transition: 0.3s;
        }
        input:focus, textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px var(--shadow);
        }
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        /* ====== Responsive ====== */
        @media (max-width: 600px) {
            .container { padding: 0 5px; }
            .header h1 { font-size: 2em; }
            .card { padding: 15px; }
            .tab-btn { font-size: 14px; padding: 10px 15px; min-width: 80px; }
            .music-player img { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

<!-- ====== قلب‌های شناور ====== -->
<div class="floating-hearts" id="hearts"></div>

<!-- ====== محتوا ====== -->
<div class="container">
    
    <!-- هدر -->
    <div class="header">
        <h1>❤️ به سایت عشق خوش اومدی</h1>
        <p class="sub">🌹 برای عزیزترین آدم زندگی‌ام</p>
        <div class="greeting" id="greeting"></div>
        
        <!-- تم سلکتور -->
        <div class="theme-selector">
            <button class="theme-btn rose active" onclick="changeTheme('rose')" title="تم رز"></button>
            <button class="theme-btn violet" onclick="changeTheme('violet')" title="تم بنفشه"></button>
            <button class="theme-btn sky" onclick="changeTheme('sky')" title="تم آسمونی"></button>
            <button class="theme-btn sunset" onclick="changeTheme('sunset')" title="تم شفق"></button>
        </div>
    </div>
    
    <!-- ====== تب‌ها ====== -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="tab-messages">📝 پیام‌ها</button>
        <button class="tab-btn" data-tab="tab-music">🎵 موزیک</button>
        <button class="tab-btn" data-tab="tab-poll">📊 نظرسنجی</button>
        <button class="tab-btn" data-tab="tab-comments">💬 نظرات</button>
    </div>
    
    <!-- ====== بخش ۱: پیام‌ها ====== -->
    <div class="card active" id="tab-messages">
        <h2>📝 پیام‌های امروز</h2>
        <div id="messageList"></div>
    </div>
    
    <!-- ====== بخش ۲: موزیک ====== -->
    <div class="card" id="tab-music">
        <h2>🎵 آهنگ‌های مخصوص تو</h2>
        <div id="playerArea">
            <div class="music-player" id="currentPlayer">
                <img id="currentCover" src="https://via.placeholder.com/80" alt="کاور">
                <div class="info">
                    <h3 id="currentTitle">انتخاب کن...</h3>
                    <p id="currentArtist">♥</p>
                    <audio controls id="audioPlayer" style="width:100%;"></audio>
                    <button class="btn btn-small" onclick="downloadCurrentSong()">⬇️ دانلود</button>
                </div>
            </div>
        </div>
        <hr style="margin:20px 0; border-color:var(--border);">
        <div id="playlist"></div>
    </div>
    
    <!-- ====== بخش ۳: نظرسنجی ====== -->
    <div class="card" id="tab-poll">
        <h2>📊 نظرسنجی امروز</h2>
        <p id="pollQuestion" style="font-size:18px; margin-bottom:15px;"></p>
        <div id="pollOptions"></div>
        <button class="btn" onclick="submitVote()">🗳️ رای بده</button>
        <div id="pollResults" style="margin-top:20px;"></div>
        <div class="poll-history" id="pollHistory"></div>
    </div>
    
    <!-- ====== بخش ۴: نظرات ====== -->
    <div class="card" id="tab-comments">
        <h2>💬 سوال یا حرف داری؟</h2>
        <textarea id="commentInput" placeholder="هر چی دلت می‌خواد بنویس... ❤️"></textarea>
        <button class="btn" onclick="sendComment()">📤 ارسال</button>
        <div id="commentsList" style="margin-top:15px;"></div>
    </div>
    
    <!-- ====== فوتر ====== -->
    <div class="footer" id="footer"></div>
    
    <!-- ====== دکمه مدیریت (کوچک پایین) ====== -->
    <button class="btn btn-small" onclick="toggleAdmin()" style="position:fixed; bottom:20px; right:20px; z-index:100; padding:8px 16px; font-size:14px; box-shadow:0 4px 20px var(--shadow);">
        ⚙️
    </button>
    
    <!-- ====== پنل مدیریت (مودال) ====== -->
    <div id="adminPanel">
        <div class="modal">
            <button class="close-btn" onclick="toggleAdmin()">✕</button>
            <h2>🔐 پنل مدیریت</h2>
            <input type="password" id="adminPass" placeholder="رمز مدیریت را وارد کن...">
            <button class="btn" onclick="checkAdmin()" style="width:100%;">ورود</button>
            
            <div id="adminContent" style="display:none; margin-top:20px;">
                <!-- افزودن پیام -->
                <div class="admin-section">
                    <h3>➕ افزودن پیام جدید</h3>
                    <textarea id="newMsg" placeholder="متن پیام..."></textarea>
                    <button class="btn" onclick="addMessage()">ذخیره پیام</button>
                </div>
                
                <!-- افزودن آهنگ -->
                <div class="admin-section">
                    <h3>➕ افزودن آهنگ جدید</h3>
                    <input id="newSongTitle" placeholder="عنوان آهنگ">
                    <input id="newSongArtist" placeholder="نام خواننده">
                    <input id="newSongCover" placeholder="آدرس کاور (تصویر)">
                    <input id="newSongSrc" placeholder="آدرس فایل MP3">
                    <button class="btn" onclick="addMusic()">ذخیره آهنگ</button>
                </div>
                
                <!-- مدیریت نظرسنجی -->
                <div class="admin-section">
                    <h3>📊 مدیریت نظرسنجی</h3>
                    <input id="newPollQuestion" placeholder="سوال نظرسنجی">
                    <input id="newPollOptions" placeholder="گزینه‌ها (با کاما جدا کن)">
                    <button class="btn" onclick="updatePoll()">بروزرسانی نظرسنجی</button>
                </div>
                
                <!-- پاسخ به نظرات -->
                <div class="admin-section">
                    <h3>💬 پاسخ به نظرات</h3>
                    <select id="commentSelect"></select>
                    <input id="replyInput" placeholder="پاسخ تو...">
                    <button class="btn" onclick="replyComment()">ارسال پاسخ</button>
                </div>
            </div>
        </div>
    </div>
    
</div>

<script>
// ============================================================
// ====== تنظیمات JSONBin ======
// ============================================================
const BIN_ID = "6a39af83f5f4af5e291fb234";
const API_KEY = "$2a$10$T5EPBDRRV0x0N1tvvwV8S.6tmn7B5tKzbke49eZNVhBe7g2mdzNKm";
const ADMIN_PASSWORD = "AY_NAY";

// ============================================================
// ====== متغیرها ======
// ============================================================
let data = null;
let currentSongIndex = 0;

// ============================================================
// ====== تم ======
// ============================================================
function changeTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.toggle('active', btn.classList.contains(theme));
    });
}

// بارگذاری تم ذخیره شده
const savedTheme = localStorage.getItem('theme') || 'rose';
changeTheme(savedTheme);

// ============================================================
// ====== قلب‌های شناور ======
// ============================================================
function createHearts() {
    const container = document.getElementById('hearts');
    const emojis = ['❤️', '💖', '💗', '💕', '♥️', '💘', '🌹'];
    for(let i=0; i<20; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.animationDuration = (6 + Math.random() * 10) + 's';
        heart.style.animationDelay = (Math.random() * 10) + 's';
        heart.style.fontSize = (15 + Math.random() * 35) + 'px';
        container.appendChild(heart);
    }
}
createHearts();

// ============================================================
// ====== تایپینگ افکت ======
// ============================================================
function typeGreeting() {
    const texts = [
        '🌹 به عزیزترین آدم زندگی خوش اومدی...',
        '❤️ اینجا همه چیز برای توست...',
        '💕 امیدوارم لحظات قشنگی رو اینجا داشته باشی...',
        '🌟 تو بهترین اتفاق زندگی منی...'
    ];
    const el = document.getElementById('greeting');
    let index = 0;
    let charIndex = 0;
    let isDeleting = false;
    
    function type() {
        const current = texts[index];
        if(!isDeleting) {
            el.innerHTML = current.substring(0, charIndex) + '<span class="typing-cursor"></span>';
            charIndex++;
            if(charIndex > current.length) {
                isDeleting = true;
                setTimeout(type, 2000);
                return;
            }
            setTimeout(type, 50);
        } else {
            el.innerHTML = current.substring(0, charIndex) + '<span class="typing-cursor"></span>';
            charIndex--;
            if(charIndex < 0) {
                isDeleting = false;
                index = (index + 1) % texts.length;
                setTimeout(type, 500);
                return;
            }
            setTimeout(type, 30);
        }
    }
    type();
}
typeGreeting();

// ============================================================
// ====== ارتباط با JSONBin ======
// ============================================================
async function loadData() {
    try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            headers: { 'X-Master-Key': API_KEY }
        });
        const json = await res.json();
        data = json.record;
        renderAll();
    } catch(e) {
        console.error('خطا:', e);
        if(!data) {
            data = {
                messages: [{ id:1, text:"❤️ امروز عاشقتم بیشتر از دیروز", date: new Date().toISOString().split('T')[0] }],
                music: [
                    { id:1, title:"بی تو", artist:"محسن چاوشی", cover:"https://via.placeholder.com/80", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" }
                ],
                polls: {
                    question: "حالت چطوره امروز؟",
                    options: ["عالی 😍", "خوب 😊", "معمولی 😐"],
                    votes: {},
                    history: {}
                },
                comments: []
            };
            renderAll();
        }
    }
}

async function saveData() {
    try {
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': API_KEY
            },
            body: JSON.stringify(data)
        });
    } catch(e) {
        console.error('خطا در ذخیره:', e);
        alert('❌ خطا در ذخیره!');
    }
}

// ============================================================
// ====== رندر ======
// ============================================================
function renderAll() {
    if(!data) return;
    renderMessages();
    renderPlaylist();
    renderPoll();
    renderComments();
    updateFooter();
}

// ---------- فوتر ----------
function updateFooter() {
    const now = new Date();
    const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
    const persian = now.toLocaleDateString('fa-IR', options);
    const gregorian = now.toLocaleDateString('en-US', options);
    document.getElementById('footer').innerHTML = `
        ❤️ با عشق ساخته شده | 
        📅 ${persian} | 
        🌍 ${gregorian}
    `;
}

// ---------- پیام‌ها ----------
function renderMessages() {
    const list = document.getElementById('messageList');
    const today = new Date().toISOString().split('T')[0];
    list.innerHTML = '';
    const msgs = data.messages || [];
    if(msgs.length === 0) {
        list.innerHTML = '<p style="color:#888;">هنوز پیامی نذاشتی عزیزم ❤️</p>';
        return;
    }
    msgs.slice().reverse().forEach(msg => {
        const div = document.createElement('div');
        div.className = 'msg-item' + (msg.date === today ? ' today' : '');
        div.innerHTML = `
            <div>${msg.text}</div>
            <div class="msg-date">${msg.date} ${msg.date === today ? '⭐ امروز' : ''}</div>
        `;
        list.appendChild(div);
    });
}

// ---------- موزیک ----------
function renderPlaylist() {
    const list = document.getElementById('playlist');
    const music = data.music || [];
    list.innerHTML = '';
    if(music.length === 0) {
        list.innerHTML = '<p style="color:#888;">آهنگ‌ها رو از پنل مدیریت اضافه کن 🎶</p>';
        return;
    }
    music.forEach((song, index) => {
        const div = document.createElement('div');
        div.className = 'music-item';
        div.innerHTML = `
            <img src="${song.cover || 'https://via.placeholder.com/50'}" alt="کاور" onerror="this.src='https://via.placeholder.com/50'">
            <div class="info">
                <div class="title">${song.title}</div>
                <div class="artist">${song.artist || 'بی‌نام'}</div>
            </div>
            <button class="btn btn-small" onclick="playSong(${index})">▶️ پخش</button>
        `;
        list.appendChild(div);
    });
    if(music.length > 0 && !document.getElementById('audioPlayer').src) {
        playSong(0);
    }
}

function playSong(index) {
    const music = data.music || [];
    if(!music[index]) return;
    currentSongIndex = index;
    const song = music[index];
    document.getElementById('currentCover').src = song.cover || 'https://via.placeholder.com/80';
    document.getElementById('currentTitle').textContent = song.title;
    document.getElementById('currentArtist').textContent = '🎤 ' + (song.artist || 'بی‌نام');
    const audio = document.getElementById('audioPlayer');
    audio.src = song.src || '';
    audio.load();
    audio.play().catch(() => {});
}

function downloadCurrentSong() {
    const src = document.getElementById('audioPlayer').src;
    if(src && src !== '') {
        const a = document.createElement('a');
        a.href = src;
        a.download = 'آهنگ_عاشقانه.mp3';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    } else {
        alert('اول یه آهنگ انتخاب کن! 🎵');
    }
}

// ---------- نظرسنجی ----------
function renderPoll() {
    const poll = data.polls || { 
        question: 'حالت چطوره؟', 
        options: ['عالی 😍', 'خوب 😊', 'معمولی 😐'], 
        votes: {},
        history: {}
    };
    
    // سوال و گزینه‌ها
    document.getElementById('pollQuestion').textContent = poll.question || 'حالت چطوره امروز؟';
    const container = document.getElementById('pollOptions');
    container.innerHTML = '';
    const today = new Date().toISOString().split('T')[0];
    const hasVoted = poll.votes && poll.votes[today];
    
    (poll.options || []).forEach(opt => {
        const label = document.createElement('label');
        label.className = 'poll-option';
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'poll';
        radio.value = opt;
        radio.disabled = !!hasVoted;
        label.appendChild(radio);
        label.appendChild(document.createTextNode(' ' + opt));
        container.appendChild(label);
    });
    
    // نتایج امروز
    const results = document.getElementById('pollResults');
    if(poll.votes && poll.votes[today]) {
        const todayVotes = poll.votes[today];
        const total = Object.values(todayVotes).reduce((a,b) => a + b, 0);
        results.innerHTML = '<h4>📊 نتایج امروز:</h4>';
        if(total === 0) {
            results.innerHTML += '<p style="color:#888;">هنوز رایی ثبت نشده 😊</p>';
        } else {
            (poll.options || []).forEach(opt => {
                const count = todayVotes[opt] || 0;
                const percent = total > 0 ? Math.round((count/total)*100) : 0;
                results.innerHTML += `
                    <div class="poll-result">
                        <div class="label">
                            <span>${opt}</span>
                            <span>${count} رای (${percent}%)</span>
                        </div>
                        <div class="bar">
                            <div class="fill" style="width:${percent}%">${percent}%</div>
                        </div>
                    </div>
                `;
            });
        }
    } else {
        results.innerHTML = '<p style="color:#888;">هنوز رایی ثبت نشده، اولین نفر باش 😍</p>';
    }
    
    // تاریخچه نظرسنجی
    const historyDiv = document.getElementById('pollHistory');
    historyDiv.innerHTML = '<h4>📜 تاریخچه نظرسنجی:</h4>';
    if(poll.history && Object.keys(poll.history).length > 0) {
        const sortedDates = Object.keys(poll.history).sort().reverse();
        sortedDates.forEach(date => {
            if(date === today) return; // امروز رو بالا نشون دادیم
            const dayVotes = poll.history[date];
            const total = Object.values(dayVotes).reduce((a,b) => a + b, 0);
            const div = document.createElement('div');
            div.className = 'poll-history-item';
            let details = Object.entries(dayVotes)
                .map(([opt, count]) => `${opt}: ${count} (${Math.round((count/total)*100)}%)`)
                .join(' | ');
            div.innerHTML = `
                <div class="date">📅 ${date}</div>
                <div style="font-size:13px;">${details}</div>
                <div style="font-size:12px; color:#888;">مجموع: ${total} رای</div>
            `;
            historyDiv.appendChild(div);
        });
    } else {
        historyDiv.innerHTML += '<p style="color:#888;">هنوز نظرسنجی قبلی ثبت نشده</p>';
    }
}

function submitVote() {
    const poll = data.polls || {};
    const today = new Date().toISOString().split('T')[0];
    if(!poll.votes) poll.votes = {};
    if(poll.votes[today]) {
        alert('امروز قبلاً رای دادی! 😊');
        return;
    }
    const selected = document.querySelector('input[name="poll"]:checked');
    if(!selected) {
        alert('لطفاً یه گزینه رو انتخاب کن!');
        return;
    }
    if(!poll.votes[today]) poll.votes[today] = {};
    poll.votes[today][selected.value] = (poll.votes[today][selected.value] || 0) + 1;
    
    // ذخیره در تاریخچه
    if(!poll.history) poll.history = {};
    poll.history[today] = {...poll.votes[today]};
    
    data.polls = poll;
    saveData();
    renderPoll();
}

// ---------- نظرات ----------
function renderComments() {
    const list = document.getElementById('commentsList');
    const comments = data.comments || [];
    list.innerHTML = '';
    if(comments.length === 0) {
        list.innerHTML = '<p style="color:#888;">هنوز نظری نیست، اولین نفر باش 💬</p>';
        return;
    }
    comments.slice().reverse().forEach(c => {
        const div = document.createElement('div');
        div.className = 'comment-item';
        div.innerHTML = `
            <div>💬 ${c.text}</div>
            ${c.reply ? `<div class="comment-reply">💝 پاسخ: ${c.reply}</div>` : '<div style="color:#888;font-size:14px;">⏳ در انتظار پاسخ...</div>'}
            <div style="font-size:11px;color:#aaa;margin-top:5px;">${c.date || ''}</div>
        `;
        list.appendChild(div);
    });
}

function sendComment() {
    const input = document.getElementById('commentInput');
    const text = input.value.trim();
    if(!text) {
        alert('یه چیزی بنویس عزیزم! ❤️');
        return;
    }
    if(!data.comments) data.comments = [];
    data.comments.push({
        id: Date.now(),
        text: text,
        date: new Date().toLocaleDateString('fa-IR') + ' ' + new Date().toLocaleTimeString('fa-IR'),
        reply: ''
    });
    input.value = '';
    saveData();
    renderComments();
    updateCommentSelect();
}

// ====== پنل مدیریت ======
// ============================================================
function toggleAdmin() {
    const panel = document.getElementById('adminPanel');
    panel.classList.toggle('show');
    if(panel.classList.contains('show')) {
        document.getElementById('adminPass').value = '';
        document.getElementById('adminContent').style.display = 'none';
        updateCommentSelect();
    }
}

function checkAdmin() {
    const pass = document.getElementById('adminPass').value;
    if(pass === ADMIN_PASSWORD) {
        document.getElementById('adminContent').style.display = 'block';
        document.getElementById('adminPass').value = '';
        alert('✅ به پنل مدیریت خوش اومدی عزیزم! ❤️');
        updateCommentSelect();
    } else {
        alert('❌ رمز اشتباهه!');
    }
}

function updateCommentSelect() {
    const sel = document.getElementById('commentSelect');
    if(!sel) return;
    sel.innerHTML = '';
    const noReply = (data.comments || []).filter(c => !c.reply);
    if(noReply.length === 0) {
        const opt = document.createElement('option');
        opt.textContent = '❗ هیچ نظری برای پاسخ نیست';
        opt.disabled = true;
        sel.appendChild(opt);
    } else {
        noReply.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = c.text.substring(0, 40) + (c.text.length > 40 ? '...' : '');
            sel.appendChild(opt);
        });
    }
}

// ---------- مدیریت: پیام ----------
function addMessage() {
    const text = document.getElementById('newMsg').value.trim();
    if(!text) { alert('متن پیام رو بنویس!'); return; }
    if(!data.messages) data.messages = [];
    data.messages.push({
        id: Date.now(),
        text: text,
        date: new Date().toISOString().split('T')[0]
    });
    document.getElementById('newMsg').value = '';
    saveData();
    renderMessages();
    alert('✅ پیام ذخیره شد! ❤️');
}

// ---------- مدیریت: آهنگ ----------
function addMusic() {
    const title = document.getElementById('newSongTitle').value.trim();
    const artist = document.getElementById('newSongArtist').value.trim();
    const cover = document.getElementById('newSongCover').value.trim();
    const src = document.getElementById('newSongSrc').value.trim();
    if(!title || !src) { alert('عنوان و لینک آهنگ الزامی‌ست!'); return; }
    if(!data.music) data.music = [];
    data.music.push({ 
        id: Date.now(), 
        title, 
        artist: artist || 'بی‌نام', 
        cover: cover || 'https://via.placeholder.com/80', 
        src 
    });
    document.getElementById('newSongTitle').value = '';
    document.getElementById('newSongArtist').value = '';
    document.getElementById('newSongCover').value = '';
    document.getElementById('newSongSrc').value = '';
    saveData();
    renderPlaylist();
    alert('✅ آهنگ اضافه شد! 🎵');
}

// ---------- مدیریت: نظرسنجی ----------
function updatePoll() {
    const question = document.getElementById('newPollQuestion').value.trim();
    const optionsRaw = document.getElementById('newPollOptions').value.trim();
    if(!question || !optionsRaw) { alert('سوال و گزینه‌ها رو پر کن!'); return; }
    const options = optionsRaw.split(',').map(s => s.trim()).filter(s => s);
    if(options.length < 2) { alert('حداقل ۲ گزینه وارد کن!'); return; }
    data.polls = {
        question: question,
        options: options,
        votes: {},
        history: data.polls?.history || {}
    };
    document.getElementById('newPollQuestion').value = '';
    document.getElementById('newPollOptions').value = '';
    saveData();
    renderPoll();
    alert('✅ نظرسنجی بروزرسانی شد!');
}

// ---------- مدیریت: پاسخ ----------
function replyComment() {
    const sel = document.getElementById('commentSelect');
    const reply = document.getElementById('replyInput').value.trim();
    if(!reply) { alert('پاسخ رو بنویس!'); return; }
    const id = parseInt(sel.value);
    const comment = (data.comments || []).find(c => c.id === id);
    if(comment) {
        comment.reply = reply;
        document.getElementById('replyInput').value = '';
        saveData();
        renderComments();
        updateCommentSelect();
        alert('✅ پاسخ ارسال شد! 💝');
    } else {
        alert('❗ نظری برای پاسخ نیست!');
    }
}
